front:
  text: 序余於乙卯冬載硯歸籍嘗輯歸硯録以見志友人時招余遊滬輒為事阻未得果行庚申秋渟溪被難後諸相知招遊甬越武林余謂必爭之地完善之區繁富之鄉我能往寇亦能往何必多此跋涉耶悉卻之意欲乘桴海上法聖人之居九夷而季傑性癡若蕖相繼病危蓋季傑神氣素怯驚嚇感邪病未解而正氣散漫不能自持余以攘外安內治之性癡善憂多郁氣機澀伏邪遂得依山傍險而負固不解余但舒其鬱結消其憂悶徐為疏瀹邪亦潛消若渠弱而好俠嫉官兵之無用憤寇氛之日張怒木直升發沖眥裂柔金失降胃閉津枯一息懨懨舌尖焦硬飲難下咽聞藥即嘔肌消音微涎流腥赤自知不起無藥可投余以毫無氣味性極平淡之西洋參枇杷葉石斛蘆根竹茹鮮稻頭煎而頻灌始漸轉機逮二病痊可又為次女嫁事所羈既而彤彤徂暑畏於登程且挈眷以行談何容易孑身而往誰託事孥展轉思維殊無善策承呂君慎庵招遊濮院遂乘舟前往寄廡於董君枯匏家閉戶忍飢草飲食譜雞鳴録二書以虜憂悃甫脫稿而渟溪復遭焚掠季傑挈眷徒於窮鄉山妻攜四女來濮嗣杭垣復陷洲城亦潰天崩地裂無路可行急將三四二女擇攸遣嫁而四女所歸姚氏世居嘉興之僻鄉慎庵已挈眷避此故為我謀此退步也四月十三日賊過梅涇闔鎮皆逃余遂送山妻及五六二女於姚氏而陳君半樵適以信來招遊滬瀆有桐廬王文介者病危於屠甸神昏遺矢醫皆卻走宗侄紹武飛函丐余往視乃溫邪誤表也幸體堅邪有下行之路與大劑涼解而瘥紹武亦慫恿遊滬因於二十四日托妻孥於姚呂諸君而行五月初三日抵滬此地曾遭兵燹不但滄海漸變桑田中原宛如外國二十年來開闢日甚商舶鱗集而江浙之幸免於難者率避於此帆檣林立踵接肩摩彈丸小邑居然成一大都會矣余以性情疏懶相識者多既無泛應之才又恐不知者疑為有求而來也故不謁一客暫寓東門外周君採山德泰紙號內以半樵紹武皆在此佐會計而周氏昆仲向以青眼視我雖市廛紛沓藉省旅資惟採山四令弟履慶去年患病盼余甚切至彌留時猶道余不置口余為酷熱不能行不料其英一病而不起也神交數載竟無一面之緣清夜捫心徒呼負負居數日乞診者紛紛聊記一二用質宗工題曰醫影而序其乘桴之由如下同治元年夏五月海昌睡鄉散人題於申江寓次陳君春泉之令愛甫三齡患寒熱脹瀉醫治多日頸軟肢搐涕淚全無以為延成慢驚試以溫補神識漸至不清又疑邪氣逆傳灌以犀角等藥病日劇遂束手速余勘之乃飲食不節脾胃不調耳春泉始悟前因失恃無乳常啖龍眼棗脯等物以滋補也余以雞內金五穀蟲鱉甲川朴黃連竹茹冬瓜皮防風米仁蘆根等為方一劑知數劑愈童少塘之子五歲患瀉身熱醫與溫中健脾藥熱壯無溺苔黑齒焦口渴無眠漸至嘔吐余用芩連茹滑銀花石斛緑豆衣冬瓜皮蘆根等味數劑霍然沈寅甫令正患少腹聚氣痛無定所甚至渾身筋骨痠痛寒熱如瘧醫謂外感治之日劇眠食皆廢余按脈微數而弦重取極細乃八脈大虧之證經豫一貫煎加減投之旬余而瘳倪笠坪患感旬余屢醫不效邀余往勘乃濕溫證也投藥十劑而痊乃弟筱坪亦病此服藥數劑已有小效更醫用柴葛三帖勢漸劇復請視囑曰此名重暍氣液二傷矣授輕養清化法甫得轉機又易醫驟進生地龜板等味而痰濕膩絡厄汗陡作乃浼王小鐵孝廉邀診已不能措手矣嗣有黃上水孝廉來申患濕溫醫與柴葛二帖足冷麵紅胸痞多汗延診授清化法二帖足溫面赤退矣惟胸悶未得全舒疑為有疹不達更醫迎合二進辛透遂痰塞欲厥而亡錢儀華體弱患感醫治多日目瞪神呆不眠不食不便不言肢痙流涎牙關咬緊危象畢呈矣余察脈弦長而滑不甚鼓指苔色黃膩良由醫者不辨病之在氣在血初起則升透繼因譫語即用生地等血分之品以滋塞其邪遂成負固不解之勢雖便祕多日而邪尚在上不可下也授小陷胸加茹薤菖朴芩翹竹瀝為方數服便行而愈嗣有倪某亦因誤治如前而咳逆葉沫間或帶血豫小陷胸合葦莖去米仁加王不留行蒲公英雪羹數帖下其燥矢咳逆平而愈丁曉山室久患頭痛臥榻不起耳鳴睛赤食減無眠頻年培補證日以加乃兄黃純安請往視之脈弦滑而數口苦苔黃乃風自火出搏液成痰溫補誤投遂成錮疾也豫芩連膽柏茹夏羚菊梔蒺地丁石斛決明海虴等十餘劑勢大減苔退加餐加入二至生地大冬以滋水漸安眠食而能起坐矣洞庭吳某患四肢痠痛形瘦便艱口渴不飢睛紅溺赤醫投滋養即形脘悶稍進辛通煩渴益甚就余診脈弦滑而軟是木熱流脂肝陽爍液也以元參白薇王不留行地丁蔞仁鮮斛昆布紫菀知母竹瀝服旬余而痊錢塘吳菊談茂才令弟竹溪在德泰權帳事始患泄瀉余知其蘊濕內盛邪尋出路也囑其節食忌口渠持體堅飲啖如故已而身熱頭重脘悶不飢與清宣法病即解遂啖飯碗半余謂必復也次日果不能食熱壯麵紅口渴苔黃溺色帶黑是邪得食助悉從火化所謂谷入於陰長氣於陽也遂豫大劑清化加枳桔數劑漸瘥而厄忒連朝人皆危之余謂無恐也府氣未通上焦更有痰阻氣機耳但用輕清展化果痰吐便行以愈補擬清化方淡豆豉焦山梔皮杏仁桔梗枳實花粉佩蘭葉連翹通草瓜蔞焦山楂炒萊蔔子補擬輕清展化方旋覆花紫菀白前橘皮竹茹柿蒂黃鬱金川貝蔞皮枳殼鮮枇杷葉周君採山令妹年二十三歲體豐而患腿痠胸悶上身壯熱多汗頭痛畏風腰下無汗二腿不溫苔色膩黃渴須熱飲脈來滑數徹夜無眠或疑其虛余謂痰阻氣鬱吸受溫邪兼挾濕滯格拒不通法當開降既不可補亦忌溫升豫芩連茹夏紫菀蔞仁蛤粉滑石川朴蘆根等藥數劑渾身發斑又數劑冷痰始吐再加石膏痰由大便而下垢苔始退二足漸溫適汛至去芩連蔞仁加枇杷葉又三劑熱退脈和胸中舒暢知飢能寐授潛陽鎮補而痊肆安陳半樵年三十五歲患身熱便瀉口乾仍強起任事察其脈虛大而弦是憂勞過甚元氣大虧之證幸而能食亟與參耆苓草防芍木瓜陳皮石斛旬日霍然即旋里省親逾月來申患暑濕類瘧豫清化藥四帖而愈但覺疲憊仍以參耆柏草等培其本元仁和周鶴庭室年逾四旬陰虛有素而多産育竄難來申懷胎五月暑熱外侵飢不能餐飲亦欲噎身熱時作胎沖欲墜苦渴苔黃肢面時麻便溏不暢齦癰溺清形削麵黧標實中虛以西洋參銀花各三錢連翹西瓜翠衣各四錢蒲公英鮮斛各八錢桑葉二錢蘇梗竹茹各錢半絲瓜絡白薇石菖蒲各一錢服三帖得汗熱退癰潰胎安能食溺通而愈姚歐亭夫人年五十九歲素傷謀慮首如戴帽杳不知飢夜來非酒不眠苔色一塊白滯時或腹痛手心如烙脈左弦數右軟滑乃木熱流脂痰阻氣機胃受肝乘有升無降也豫連夏茹苓蛤殼延胡楝等雪羹二帖便瀉稍帶血塊而腹痛減首帽除苔亦鬆泛納食略增惟晨起苦渴改授參蛤殼橘半苓茹苡斛絲瓜絡海藻囑其常服以通胃舒肝滌痰清絡為善後法服旬日右脈起矣歐亭二令愛年二十八歲幼年患四肢不舒誤服靈砂等藥遂成錮疾今晡熱嗽痰苔白而渴齦腫而痛頰癢便溏是伏熱生風兼挾暑感豫石膏滑石羚羊桑葉橘半茹斛功勞絲瓜絡西瓜翠等不旬皆愈歐亭令孫年十九患膽怯善驚精滑不固鼻赤形瘦舌絳口乾以元參丹參生地天冬竹茹連柏生草砂仁蓮子心歸身等數帖而安姚嶅庵比部年五十八歲患痰喘自汗便溏不暢或以為下元大衰議用大劑附桂豫診脈滑而長乃上焦痰火為患以杏朴滑菀射干竹茹蛤殼鵝管石蘆根等而愈堂按方內有鵝管石一味是上焦雖有痰火下原亦衰矣嶅庵令寵患痰嗽巔疼口乾脅躍不飢而渴時或吐酸舌赤脈弦以一貫煎增損投匕即安一貫煎沙參麥冬地黃杞子歸身川楝子口苦燥者加川連此方魏玉橫所撰治脅痛胃痛吞酸吐酸嘉善顧應如茂才年逾六旬每日吸洋煙五錢久患痰嗽口乾耳鳴頭響小溲梗澀大便艱難多藥罕效豫一貫煎而愈姚晉軒令媳體素弱邇來時患氣墜墜後上升杳不知飢腿涼麵赤口熱如火左脅如疼心下如盤屢服滋養人乳病日以劇余勘其脈弦細以滑乃肝熱而停飲也柔膩惡可投乎豫紫菀白前茹半旋菖絲瓜絡蛤粉雪羹川連蘇葉旬日而安姚歐亭七令愛自庚申患痢後便瀉不已時或腹脹形瘦少餐苔白不渴投以補脾之藥脹甚發熱脈急而弦改豫參朴橘半冬瓜皮白薇楝芍茹苡等而愈歐亭天資穎異天文地理詩畫琴書無不精妙而又深究醫理且賦體素堅自云道光間在河間患感因便祕汗多脈浮勢欲脫誤服人參神漸昏憒幸遇董某用生脈散生薑搗爛遍塗其身灌以大黃六兩芒硝三錢連下十餘次始得生機從此不敢言醫噫其聰明不如歐亭者亦何必強談醫耶歐亭云蟑螂花擦頭面瘡皰面刺應手即消煎湯洗瘡疥腳氣有奇效周採山素善飲久患心下堅硬如柈納穀甚少常時便暢則氣機較舒今忽大瀉不飢汗多形瘦勘脈微而滑豫參朮橘半苡朴茹連桂苓十味以補氣滌痰通陽化濕投匕即效數服而瘳即此加減俾其常服周採山令弟啓東體豐善啖喜於作勞陡患脘痛當心隨左右臥而較甚身熱自汗肢冷便溏苔色黃膩溺短而渴脈至右寸關模糊不應是痰濕熱夾食為患也以枳橘半滑朴茹連蔔子蘆根為劑三帖即止湖州趙君敬泉邀看周君嵐仙證年二十九歲平昔好義家遭離亂猶孳孳為善惟曰不足以致心煩慮亂若無把握惟恐顛墜神不自持脈來細數食少事繁是真陰素虧心陽過擾也豫一貫煎加牡蠣坎版石英合甘麥大棗生歸身服之甚安秀水某春間病幾危余為治愈既而余避難來申病者亦於秋間徒滬將交秋分復招診視尚不能起榻而胸滿腹大溺清便艱氣塞火升咽頰作響食後出語氣即上衝腿軟腰疼目干少寐腹中時痛泄氣稍舒欲噫不宣苔色滿布此但知其久病元虛率投守補窒其升降之機而不調其情志也以北沙參絲瓜絡枇杷葉蒲公英留行子竹茹蛤粉菖蒲蔞仁半夏蘇葉黃連為劑服之漸效若蕖稚息途次遇盜受驚汛行發熱勉強支持逮余知之即豫菖茹翹枳薇菀芩蔞梔蘆以開鬱豁痰宣氣清熱火雖下行而足溫然舌絳神瞀讝語撮空自言魂不在身脈甚滑數是痰熱膠結營津受爍竟不更衣急需濡導改用元參海虴辰冬菖蒲蔞仁鮮斛鮮生地竹瀝梨服六帖而大便行熱退舌潤神清渴喜熱飲韌痰頻吐杳不思食小溲艱澀且易嘔惡以橘半菖茹薇菀枇杷葉而飲食漸進又逾旬大解復行痰嗽肢汗出悲傷欲哭得噫始舒以一貫煎加菖蒲旋覆去歸身服之愈錢君少谷滯下久延所下腸垢似魚腦少腹尚堅硬不舒小溲短澀腰痛舌無液脈弦數而梗是陰液為肝熱所迫而不守陽氣為肝鬱所滯而不通豫白頭翁合封髓丹服數帖腹柔痢減脈和能食改三奇散合封髓而愈南潯朱浦香年五十六歲忽患厄忒暮熱陳某進滋降藥勢益甚陸定圃囑余診脈甚弦滑且數胸次痞悶乃痰阻樞機也與橘枳芩連茹射兜菀枇杷葉等藥渠嫌芩連苦寒刪去不用加入柴胡四分服後厄雖減而肝風動大汗遍身指震氣促少腹躍躍而動亟以蛤殼旋覆白前以降之得暢解數次而愈
